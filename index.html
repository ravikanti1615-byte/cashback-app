<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashback Compare</title>
  <meta name="description" content="Compare cashback rates across all major portals" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #16a34a; --green-light: #dcfce7; --green-dark: #14532d;
      --bg: #f9fafb; --card: #ffffff; --text: #111827;
      --muted: #6b7280; --border: #e5e7eb; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--green); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
    header h1 { color: white; font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    header h1 span { font-weight: 300; opacity: 0.85; }
    .search-bar { display: flex; gap: 8px; }
    .search-bar input { flex: 1; padding: 10px 14px; border-radius: 10px; border: none; font-size: 15px; outline: none; background: rgba(255,255,255,0.95); color: var(--text); }
    .search-bar input::placeholder { color: #9ca3af; }
    .search-bar button { padding: 10px 16px; background: white; color: var(--green); border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .main { padding: 16px; }
    .state-box { text-align: center; padding: 60px 20px; color: var(--muted); }
    .state-box .icon { font-size: 48px; margin-bottom: 12px; }
    .state-box p { font-size: 15px; line-height: 1.5; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .results-header h2 { font-size: 17px; font-weight: 600; }
    .results-header .count { font-size: 13px; color: var(--muted); background: var(--border); padding: 3px 10px; border-radius: 20px; }
    .updated { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .portal-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .portal-card.best { border-color: var(--green); background: #f0fdf4; }
    .portal-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .rank { font-size: 13px; font-weight: 700; color: var(--muted); min-width: 24px; }
    .rank.gold { color: #d97706; }
    .portal-info { min-width: 0; }
    .portal-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .portal-type { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .rate-badge { font-size: 16px; font-weight: 700; color: var(--green-dark); background: var(--green-light); padding: 6px 12px; border-radius: 8px; white-space: nowrap; }
    .best .rate-badge { background: var(--green); color: white; }
    .best-label { font-size: 11px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: white; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; color: var(--text); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: white; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .install-banner { background: var(--green-light); border: 1px solid #bbf7d0; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .install-banner p { font-size: 13px; color: var(--green-dark); line-height: 1.4; }
    .install-banner button { padding: 7px 14px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .close-banner { background: none !important; color: var(--muted) !important; padding: 4px !important; font-size: 18px !important; }
  </style>
</head>
<body>
<header>
  <h1>Cashback <span>Compare</span></h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search a store (e.g. nike, walmart...)" autocomplete="off" />
    <button onclick="doSearch()">Search</button>
  </div>
</header>
<div class="main" id="main">
  <div class="state-box" id="emptyState">
    <div class="icon">💰</div>
    <p>Search any store to compare cashback rates across all major portals.</p>
  </div>
</div>
<script>
  const API = 'https://cashback-app-production-dc7f.up.railway.app';
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallBanner();
  });

  function showInstallBanner() {
    const banner = document.createElement('div');
    banner.className = 'install-banner';
    banner.id = 'installBanner';
    banner.innerHTML = `
      <p>Install Cashback Compare on your phone!</p>
      <button onclick="installApp()">Install</button>
      <button class="close-banner" onclick="document.getElementById('installBanner').remove()">×</button>
    `;
    document.getElementById('main').prepend(banner);
  }

  async function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      const b = document.getElementById('installBanner');
      if (b) b.remove();
    }
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function getType(rate) {
    if (rate.includes('mi.') || rate.includes('miles')) return 'Miles';
    if (rate.includes('pt.') || rate.includes('SB') || rate.includes('UR')) return 'Points';
    return 'Cashback';
  }

  function parseRate(rate) {
    const num = parseFloat(rate.replace(/[^0-9.]/g, ''));
    return isNaN(num) ? 0 : num;
  }

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase().replace(/\s+/g, '-');
    if (!query) return;
    const main = document.getElementById('main');
    main.innerHTML = `<div class="state-box"><div class="spinner"></div><p>Finding best rates for <strong>${query}</strong>...</p></div>`;
    try {
      const res = await fetch(`${API}/api/cashback/${query}`);
      if (!res.ok) throw new Error('Not found');
      const store = await res.json();
      renderResults(store, query);
    } catch(e) {
      main.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>No results found for "<strong>${query}</strong>".<br><br>Try a different spelling.</p></div>`;
    }
  }

  function renderResults(store, query, filter = 'All') {
    const main = document.getElementById('main');
    const updatedAt = new Date(store.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    let data = [...store.data];
    if (filter !== 'All') data = data.filter(d => getType(d.rate) === filter);
    data.sort((a, b) => parseRate(b.rate) - parseRate(a.rate));
    const filters = ['All', 'Cashback', 'Miles', 'Points'];
    let html = `
      <div class="results-header">
        <h2>${store.name || query}</h2>
        <span class="count">${data.length} portals</span>
      </div>
      <div class="updated">Updated ${updatedAt}</div>
      <div class="filter-bar">
        ${filters.map(f => `<button class="filter-btn ${f===filter?'active':''}" onclick="changeFilter('${f}')">${f}</button>`).join('')}
      </div>
    `;
    if (data.length === 0) {
      html += `<div class="state-box"><div class="icon">😔</div><p>No ${filter} rates found.</p></div>`;
    } else {
      data.forEach((item, i) => {
        const isBest = i === 0;
        html += `
          <div class="portal-card ${isBest ? 'best' : ''}">
            <div class="portal-left">
              <div class="rank ${isBest ? 'gold' : ''}">${isBest ? '★' : '#'+(i+1)}</div>
              <div class="portal-info">
                <div class="portal-name">${item.portal}</div>
                <div class="portal-type">${getType(item.rate)}</div>
                ${isBest ? '<div class="best-label">Best rate</div>' : ''}
              </div>
            </div>
            <div class="rate-badge">${item.rate}</div>
          </div>
        `;
      });
    }
    main.innerHTML = html;
    window._currentStore = store;
    window._currentQuery = query;
  }

  function changeFilter(f) {
    if (window._currentStore) renderResults(window._currentStore, window._currentQuery, f);
  }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
