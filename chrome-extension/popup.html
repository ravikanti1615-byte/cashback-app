<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 320px; min-height: 200px; background: #f9fafb; color: #111827; }
    header { background: #16a34a; padding: 14px 16px; color: white; }
    header h1 { font-size: 16px; font-weight: 700; }
    header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .search-bar { display: flex; gap: 8px; padding: 12px 16px; background: white; border-bottom: 1px solid #e5e7eb; }
    .search-bar input { flex: 1; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
    .search-bar button { padding: 8px 12px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .content { padding: 12px 16px; }
    .state-box { text-align: center; padding: 30px 16px; color: #6b7280; font-size: 13px; }
    .spinner { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .portal-card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; text-decoration: none; color: #111827; }
    .portal-card.best { border-color: #16a34a; background: #f0fdf4; }
    .portal-name { font-size: 13px; font-weight: 500; }
    .portal-type { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .rate-badge { font-size: 13px; font-weight: 700; color: #14532d; background: #dcfce7; padding: 4px 8px; border-radius: 6px; white-space: nowrap; }
    .best .rate-badge { background: #16a34a; color: white; }
    .store-header { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #374151; }
    .suggestions { background: white; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; margin-top: 4px; }
    .suggestion-item { padding: 9px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f3f4f6; color: #111827; }
    .suggestion-item:hover { background: #f9fafb; }
    .suggestion-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
<header>
  <h1>💰 Cashback Compare</h1>
  <p>Find the best cashback rate for any store</p>
</header>
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search a store..." autocomplete="off" />
  <button id="searchBtn">Go</button>
</div>
<div class="content" id="content">
  <div class="state-box">
    <p>Search a store to see cashback rates</p>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
